<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hermes Voice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #080808;
    --surface: #111;
    --border: #1e1e1e;
    --text: #E4D9CC;
    --muted: #666;
    --accent: #D63929;
    --accent-glow: rgba(214,57,41,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── FLOATING SPHERE ── */
  #oracle {
    position: fixed;
    bottom: 40px;
    right: 40px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #D63929, #8a1f14 60%, #1a0503);
    box-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(214,57,41,0.15), inset 0 -4px 12px rgba(0,0,0,0.5);
    cursor: pointer;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
  }
  #oracle:hover { transform: scale(1.1); }
  #oracle.listening {
    box-shadow: 0 0 60px var(--accent-glow), 0 0 120px rgba(214,57,41,0.3), inset 0 -4px 12px rgba(0,0,0,0.5);
    animation: pulse 1.5s ease-in-out infinite;
  }
  #oracle.processing {
    box-shadow: 0 0 80px rgba(255,200,50,0.3), 0 0 150px rgba(255,200,50,0.15);
    animation: pulse-fast 0.6s ease-in-out infinite;
  }
  #oracle.speaking {
    box-shadow: 0 0 60px rgba(50,200,255,0.3), 0 0 120px rgba(50,200,255,0.15);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  @keyframes pulse-fast {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  #oracle-icon {
    font-size: 28px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: opacity 0.2s;
  }

  /* ── STATUS LABEL ── */
  #status-label {
    position: fixed;
    bottom: 130px;
    right: 40px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    text-align: right;
    line-height: 1.5;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #status-label.show { opacity: 1; }
  #status-label .state { color: var(--text); font-weight: 600; }

  /* ── TRANSCRIPT OVERLAY ── */
  #transcript {
    position: fixed;
    bottom: 160px;
    right: 40px;
    max-width: 360px;
    text-align: right;
    font-size: 0.85rem;
    line-height: 1.5;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #transcript.show { opacity: 1; }
  #transcript .interim { color: var(--muted); font-style: italic; }
  #transcript .response { color: #8cb4d6; }

  /* ── CONTAINER (full page mic fallback) ── */
  #container {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* ── RESPONSE BUBBLE ── */
  #response-bubble {
    position: fixed;
    bottom: 240px;
    right: 40px;
    max-width: 340px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--text);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.4s ease, transform 0.4s ease;
    pointer-events: none;
  }
  #response-bubble.show {
    opacity: 1;
    transform: translateY(0);
  }
  #response-bubble .typing-dots::after {
    content: '';
    animation: dots 1.5s steps(3, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  /* ── MOBILE ── */
  @media (max-width: 600px) {
    #oracle { bottom: 30px; right: 30px; width: 64px; height: 64px; }
    #oracle-icon { font-size: 22px; }
    #status-label { bottom: 100px; right: 30px; }
    #transcript { bottom: 120px; right: 30px; max-width: 260px; }
    #response-bubble { bottom: 180px; right: 30px; max-width: 280px; }
  }

  /* ── FULL SCREEN MIC (click anywhere variant) ── */
  #fullscreen-hint {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 0;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  #fullscreen-hint .big-icon { font-size: 64px; margin-bottom: 16px; }
  #fullscreen-hint p { color: var(--muted); font-size: 0.75rem; letter-spacing: 0.1em; }
</style>
</head>
<body>

<!-- Floating Sphere -->
<div id="oracle">
  <span id="oracle-icon">✦</span>
</div>

<!-- Status -->
<div id="status-label">
  <div class="state" id="state-text">idle</div>
  <div id="stt-status">tap to talk</div>
</div>

<!-- Live Transcript -->
<div id="transcript"></div>

<!-- Response Bubble -->
<div id="response-bubble"></div>

<script>
// ═══════════════════════════════════════
// HERMES VOICE — Standalone Voice Client
// ═══════════════════════════════════════

// API endpoint — update this when Worker is deployed
const API_BASE = '/api'; // Uses same origin or change to Worker URL

const ORACLE = document.getElementById('oracle');
const ICON = document.getElementById('oracle-icon');
const STATE = document.getElementById('state-text');
const STT_STATUS = document.getElementById('stt-status');
const TRANSCRIPT = document.getElementById('transcript');
const BUBBLE = document.getElementById('response-bubble');
const LABEL = document.getElementById('status-label');

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let isProcessing = false;
let isSpeaking = false;

// ── States ──
function setState(state, msg) {
  ORACLE.className = '';
  if (state === 'idle') {
    ICON.textContent = '✦';
    STATE.textContent = 'idle';
    STT_STATUS.textContent = 'tap to talk';
    LABEL.classList.remove('show');
  } else if (state === 'listening') {
    ORACLE.classList.add('listening');
    ICON.textContent = '◉';
    STATE.textContent = 'listening';
    STT_STATUS.textContent = 'speak now...';
    LABEL.classList.add('show');
  } else if (state === 'processing') {
    ORACLE.classList.add('processing');
    ICON.textContent = '⟳';
    STATE.textContent = 'thinking';
    STT_STATUS.textContent = msg || 'processing...';
    LABEL.classList.add('show');
  } else if (state === 'speaking') {
    ORACLE.classList.add('speaking');
    ICON.textContent = '♢';
    STATE.textContent = 'speaking';
    STT_STATUS.textContent = msg || 'listening to Hermes';
    LABEL.classList.add('show');
  }
}

// ── Transcript ──
function showTranscript(text, type = 'interim') {
  TRANSCRIPT.className = 'show';
  TRANSCRIPT.innerHTML = `<span class="${type}">${text}</span>`;
}

function hideTranscript() {
  TRANSCRIPT.className = '';
  TRANSCRIPT.innerHTML = '';
}

// ── Response Bubble ──
function showBubble(text, isTyping = false) {
  BUBBLE.className = 'show';
  if (isTyping) {
    BUBBLE.innerHTML = `<span class="typing-dots">${text}</span>`;
  } else {
    BUBBLE.innerHTML = text;
  }
}

function hideBubble() {
  BUBBLE.className = '';
  BUBBLE.innerHTML = '';
}

// ── Audio Recording ──
async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    
    // Check for supported mime types
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') 
      ? 'audio/webm;codecs=opus' 
      : 'audio/webm';
    
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };
    
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: mimeType });
      await processAudio(blob);
    };
    
    mediaRecorder.start();
    isRecording = true;
    setState('listening');
    
    // Browser STT for live transcript
    startBrowserSTT();
    
  } catch (err) {
    console.error('Mic error:', err);
    STT_STATUS.textContent = 'mic blocked — check permissions';
    setTimeout(() => setState('idle'), 2000);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  isRecording = false;
  stopBrowserSTT();
  setState('processing', 'transcribing...');
}

// ── Browser STT (real-time transcript) ──
let recognition = null;
let browserTranscript = '';

function startBrowserSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  
  browserTranscript = '';
  recognition = new SR();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';
  
  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        final += event.results[i][0].transcript;
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    if (final) browserTranscript += final + ' ';
    const text = browserTranscript + (interim ? ` <span class="interim">${interim}</span>` : '');
    if (text.trim()) showTranscript(text, 'transcript');
  };
  
  recognition.onerror = () => {};
  recognition.start();
}

function stopBrowserSTT() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// ── Process Audio ──
async function processAudio(audioBlob) {
  const text = browserTranscript.trim() || '[audio recorded]';
  showTranscript(text, 'transcript');
  showBubble('Sending to Hermes...', true);
  setState('processing', 'sending...');
  
  // Send to your Hermes via the API
  try {
    const formData = new FormData();
    formData.append('audio', audioBlob, 'recording.webm');
    formData.append('text', text);
    
    const response = await fetch(`${API_BASE}/hermes/voice`, {
      method: 'POST',
      body: formData
    });
    
    if (response.ok) {
      const data = await response.json();
      hideBubble();
      
      if (data.response) {
        showBubble(data.response);
      }
      
      if (data.audio_url) {
        // Play TTS response
        const audio = new Audio(data.audio_url);
        setState('speaking');
        audio.onended = () => setState('idle');
        audio.onerror = () => setState('idle');
        audio.play().catch(() => setState('idle'));
      } else {
        setState('idle');
      }
    } else {
      throw new Error(`HTTP ${response.status}`);
    }
  } catch (err) {
    console.error('API call failed:', err);
    hideBubble();
    showBubble('Connection issue — check console');
    setState('idle');
    setTimeout(hideBubble, 3000);
  }
}

// ── Play TTS Response ──
function playResponse(url) {
  const audio = new Audio(url);
  setState('speaking');
  audio.onended = () => setState('idle');
  audio.onerror = () => setState('idle');
  audio.play().catch(() => setState('idle'));
}

// ── Event Handlers ──
ORACLE.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (!isRecording && !isProcessing) startRecording();
});

ORACLE.addEventListener('mouseup', () => {
  if (isRecording) stopRecording();
});

ORACLE.addEventListener('mouseleave', () => {
  if (isRecording) stopRecording();
});

// Touch events
ORACLE.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!isRecording && !isProcessing) startRecording();
}, { passive: false });

ORACLE.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (isRecording) stopRecording();
}, { passive: false });

// Keyboard shortcut: hold Space to talk
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' && !e.repeat && !isRecording && !isProcessing) {
    e.preventDefault();
    // Don't start if typing in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    startRecording();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.key === ' ' && isRecording) {
    e.preventDefault();
    stopRecording();
  }
});

// ── Init ──
setState('idle');
console.log('✨ Hermes Voice ready — hold the sphere or Space to talk');
</script>
</body>
</html>
