<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hermes Voice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --bg: #080808;
    --surface: #111;
    --surface2: #181818;
    --border: #1e1e1e;
    --text: #E4D9CC;
    --muted: #666;
    --accent: #D63929;
    --accent-glow: rgba(214,57,41,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

  /* ── LAYOUT ── */
  #chat-panel {
    position: fixed; top: 0; left: 0; right: 0; bottom: 100px;
    overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 12px;
    scroll-behavior: smooth;
  }
  #chat-panel::-webkit-scrollbar { width: 4px; }
  #chat-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; line-height: 1.5; animation: fadeIn 0.3s ease; }
  .msg.user { background: rgba(214,57,41,0.12); border: 1px solid rgba(214,57,41,0.2); align-self: flex-end; }
  .msg.hermes { background: var(--surface2); border: 1px solid var(--border); align-self: flex-start; }
  .msg .time { font-size: 0.6rem; color: var(--muted); margin-top: 4px; text-align: right; }
  .msg.typing { color: var(--muted); font-style: italic; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── SPHERE ── */
  #oracle {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 72px; height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #D63929, #8a1f14 60%, #1a0503);
    box-shadow: 0 0 30px var(--accent-glow), inset 0 -4px 12px rgba(0,0,0,0.5);
    cursor: pointer; z-index: 99999;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
  }
  #oracle:hover { transform: translateX(-50%) scale(1.1); }
  #oracle.listening { box-shadow: 0 0 50px var(--accent-glow), 0 0 100px rgba(214,57,41,0.3); animation: pulse 1.5s infinite; }
  #oracle.processing { box-shadow: 0 0 60px rgba(255,200,50,0.3); animation: pulse-fast 0.6s infinite; }
  #oracle .icon { font-size: 26px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

  @keyframes pulse { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.08)} }
  @keyframes pulse-fast { 0%,100%{transform:translateX(-50%) scale(1)} 50%{transform:translateX(-50%) scale(1.12)} }

  #status-label {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--muted); text-align: center; font-family: 'Syne', sans-serif;
    pointer-events: none;
  }

  /* ── INPUT BAR ── */
  #input-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 16px 20px;
    display: flex; gap: 8px; align-items: center;
    background: linear-gradient(transparent, var(--bg) 40%);
  }
  #text-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem; padding: 10px 14px; border-radius: 24px;
    outline: none;
  }
  #text-input:focus { border-color: var(--accent); }
  #send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none; color: white;
    font-size: 1rem; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div id="chat-panel"></div>
<div id="status-label">tap the sphere or type below</div>
<div id="oracle" class="idle"><span class="icon">✦</span></div>
<div id="input-bar">
  <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off">
  <button id="send-btn">➤</button>
</div>

<script>
const API = 'https://hermes-voice-86h.pages.dev/api/hermes/voice';
const CHAT = document.getElementById('chat-panel');
const ORACLE = document.getElementById('oracle');
const LABEL = document.getElementById('status-label');
const INPUT = document.getElementById('text-input');
const SEND = document.getElementById('send-btn');

// ── Chat ──
function addMsg(text, who) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  div.innerHTML = text.replace(/\n/g, '<br>') + `<div class="time">${new Date().toLocaleTimeString()}</div>`;
  CHAT.appendChild(div);
  CHAT.scrollTop = CHAT.scrollHeight;
}

function addTyping() {
  const div = document.createElement('div');
  div.className = 'msg hermes typing';
  div.id = 'typing-msg';
  div.textContent = 'thinking...';
  CHAT.appendChild(div);
  CHAT.scrollTop = CHAT.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function setState(s) {
  ORACLE.className = s;
  const icon = ORACLE.querySelector('.icon');
  if (s === 'idle') { icon.textContent = '✦'; LABEL.textContent = 'tap the sphere or type'; }
  else if (s === 'listening') { icon.textContent = '◉'; LABEL.textContent = 'listening...'; }
  else if (s === 'processing') { icon.textContent = '⟳'; LABEL.textContent = 'thinking...'; }
}

// ── Send text to Hermes ──
async function sendToHermes(text) {
  if (!text.trim()) return;
  setState('processing');
  addMsg(text, 'user');
  INPUT.value = '';
  addTyping();

  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await r.json();
    removeTyping();
    addMsg(data.response || '...', 'hermes');
  } catch (e) {
    removeTyping();
    addMsg('Connection error: ' + e.message, 'hermes');
  }
  setState('idle');
}

// ── Voice Recording ──
let mediaRecorder = null, chunks = [], isRecording = false;
let recognition = null, browserText = '';

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
    mediaRecorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const text = browserText.trim() || '[voice]';
      await sendToHermes(text);
    };
    mediaRecorder.start();
    isRecording = true;
    setState('listening');

    // Browser STT
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      browserText = '';
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.onresult = e => {
        let final = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
        }
        if (final) browserText += final;
      };
      recognition.start();
    }
  } catch (e) {
    alert('Mic access needed: ' + e.message);
    setState('idle');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
}

// ── Events ──
ORACLE.addEventListener('mousedown', e => { e.preventDefault(); if (!isRecording) startRecording(); });
ORACLE.addEventListener('mouseup', () => { if (isRecording) stopRecording(); });
ORACLE.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
ORACLE.addEventListener('touchstart', e => { e.preventDefault(); if (!isRecording) startRecording(); }, { passive: false });
ORACLE.addEventListener('touchend', e => { e.preventDefault(); if (isRecording) stopRecording(); }, { passive: false });

SEND.addEventListener('click', () => sendToHermes(INPUT.value));
INPUT.addEventListener('keydown', e => { if (e.key === 'Enter') sendToHermes(INPUT.value); });

document.addEventListener('keydown', e => {
  if (e.key === ' ' && !e.repeat && !isRecording && document.activeElement !== INPUT) {
    e.preventDefault(); startRecording();
  }
});
document.addEventListener('keyup', e => {
  if (e.key === ' ' && isRecording) { e.preventDefault(); stopRecording(); }
});

console.log('✨ Hermes Voice ready');
</script>
</body>
</html>
